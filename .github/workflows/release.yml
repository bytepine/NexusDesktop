name: Release

on:
  push:
    tags:
      - "nexus-desktop-v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # w64devkit v1.x 提供 GCC 14（标准 COFF，Go CGO 兼容）
      # GCC 16+ (binutils 2.46+) 默认 BigOBJ 格式，与 Go CGO 不兼容
      - name: Install w64devkit (GCC 14)
        run: |
          $url = "https://github.com/skeeto/w64devkit/releases/download/v1.23.0/w64devkit-1.23.0.zip"
          Invoke-WebRequest -Uri $url -OutFile "w64devkit.zip" -UseBasicParsing
          Expand-Archive "w64devkit.zip" -DestinationPath "C:\w64devkit"
          echo "C:\w64devkit\w64devkit\bin" >> $env:GITHUB_PATH

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Build Windows exe
        env:
          CGO_ENABLED: "1"
        run: |
          $version = "${{ github.ref_name }}".Replace("nexus-desktop-v", "")
          go build `
            -ldflags "-H=windowsgui -s -w -X main.appVersion=$version" `
            -o "NexusDesktop-windows-amd64.exe" `
            ./cmd/nexusdesktop/

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: NexusDesktop-windows-amd64.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Build macOS app
        env:
          CGO_ENABLED: "1"
        run: |
          version="${{ github.ref_name }}"
          version="${version#nexus-desktop-v}"
          go build \
            -ldflags "-s -w -X main.appVersion=$version" \
            -o NexusDesktop \
            ./cmd/nexusdesktop/
          # 打包为 .app bundle（不含签名，用户需在系统偏好设置允许）
          mkdir -p NexusDesktop.app/Contents/MacOS
          mkdir -p NexusDesktop.app/Contents/Resources
          cp NexusDesktop NexusDesktop.app/Contents/MacOS/
          cat > NexusDesktop.app/Contents/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>NexusDesktop</string>
            <key>CFBundleIdentifier</key><string>com.bytepine.nexusdesktop</string>
            <key>CFBundleName</key><string>NexusDesktop</string>
            <key>CFBundleVersion</key><string>${version}</string>
            <key>LSUIElement</key><true/>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          EOF
          zip -r NexusDesktop-darwin-arm64.app.zip NexusDesktop.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: NexusDesktop-darwin-arm64.app.zip

  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes
        id: notes
        run: |
          version="${{ github.ref_name }}"
          version="${version#nexus-desktop-v}"
          # 提取 CHANGELOG.md 中对应版本的段落
          python3 - <<'EOF'
          import re, sys
          version = "${{ github.ref_name }}".replace("nexus-desktop-v", "")
          with open("CHANGELOG.md") as f:
              content = f.read()
          # 匹配 [version] 段落到下一个 ## 之前
          pattern = rf"## \[{re.escape(version)}\].*?(?=\n## |\Z)"
          m = re.search(pattern, content, re.DOTALL)
          notes = m.group(0).strip() if m else f"Release {version}"
          with open("release_notes.md", "w") as f:
              f.write(notes)
          EOF

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            NexusDesktop-windows-amd64.exe
            NexusDesktop-darwin-arm64.app.zip
