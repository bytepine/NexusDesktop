name: Release

on:
  push:
    tags:
      - "nexus-desktop-v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # w64devkit v1.x 提供 GCC 14（标准 COFF，Go CGO 兼容）
      # GCC 16+ (binutils 2.46+) 默认 BigOBJ 格式，与 Go CGO 不兼容
      - name: Install w64devkit (GCC 14)
        run: |
          $url = "https://github.com/skeeto/w64devkit/releases/download/v1.23.0/w64devkit-1.23.0.zip"
          Invoke-WebRequest -Uri $url -OutFile "w64devkit.zip" -UseBasicParsing
          Expand-Archive "w64devkit.zip" -DestinationPath "C:\w64devkit"
          echo "C:\w64devkit\w64devkit\bin" >> $env:GITHUB_PATH

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Install rsrc (Windows icon embedding)
        run: go install github.com/akavel/rsrc@latest

      - name: Build Windows exe
        run: |
          $version = "${{ github.ref_name }}".Replace("nexus-desktop-v", "")
          python scripts/build_desktop.py --version $version --output release --build-type release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: release/NexusDesktop-windows-amd64.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Install Fyne CLI
        run: go install fyne.io/fyne/v2/cmd/fyne@latest

      - name: Build macOS app
        run: |
          version="${{ github.ref_name }}"
          version="${version#nexus-desktop-v}"
          python3 scripts/build_desktop.py --version "$version" --output release --build-type release

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: release/NexusDesktop-darwin-*.app.zip

  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes
        run: |
          version="${{ github.ref_name }}"
          version="${version#nexus-desktop-v}"
          python3 scripts/extract_release_notes.py \
            --version "$version" \
            --output release_notes.md \
            --verify

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            NexusDesktop-windows-amd64.exe
            NexusDesktop-darwin-*.app.zip
